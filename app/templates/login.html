{% extends "layout.html" %}
{% block content %}
<div class="login-wrap">
  <div class="card module-content login-card">
    <div class="login-brand">
      <img src="/static/fetcher-logo.svg" alt="" class="login-brand-mark" width="58" height="58" />
      <span class="login-brand-name">Fetcher</span>
    </div>
    <h1 class="login-title">Sign in</h1>
    <p class="hint login-hint">{{ app_name }} — enter your credentials to continue.</p>
    {% if error %}
    <div class="banner banner-warn" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login" class="setup-wizard-form login-form">
      <input type="hidden" name="next" value="{{ login_next|default('/', true)|e }}" />
      <label for="username">Username</label>
      <input class="input" id="username" name="username" type="text" autocomplete="username" required />
      <label for="password">Password</label>
      <input class="password" id="password" name="password" type="password" autocomplete="current-password" required />
      <div class="setup-wizard-footer login-footer">
        <button class="btn login-submit" type="submit">Sign in</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
