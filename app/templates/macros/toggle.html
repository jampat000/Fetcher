{# Reusable switch: real checkbox for form POST; visual .toggle from CSS. #}
{% macro toggle_checkbox(name, checked=false) -%}
<label class="toggle-field checkline-toggle">
  <input type="checkbox" name="{{ name }}"{% if checked %} checked{% endif %} class="toggle-input" />
  <span class="toggle" aria-hidden="true"><span class="toggle-knob"></span></span>
  <span class="toggle-label">{{ caller() }}</span>
</label>
{%- endmacro %}
