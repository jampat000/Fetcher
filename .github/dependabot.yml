version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      pip:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 4
    labels:
      - dependencies
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      # Action pin churn; security advisories still raise dedicated updates.
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
