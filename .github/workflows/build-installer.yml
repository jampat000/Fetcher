# Build Fetcher PyInstaller bundle (ffmpeg/ffprobe via FETCHER_FFMPEG_BIN_DIR) + Inno Setup installer.
# Artifacts: FetcherSetup.exe, portable Fetcher-Windows-{VERSION}-bundle.zip (workflow run + GitHub Release on tag).

name: Build installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

# Group by ref so a `workflow_dispatch` from `master` does not cancel an in-flight tag build for the same SHA.
concurrency:
  group: build-installer-${{ github.ref }}
  cancel-in-progress: true

# Opt in to Node 24 for JS actions until all deps default to it (GitHub deprecation of Node 20).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Pinned Gyan essentials (Windows x64). Bump URL + SHA256 together when upgrading.
  FFMPEG_ESSENTIALS_URL: https://github.com/GyanD/codexffmpeg/releases/download/8.1/ffmpeg-8.1-essentials_build.zip
  FFMPEG_ESSENTIALS_SHA256: 8748283d821613d930b0e7be685aaa9df4ca6f0ad4d0c42fd02622b3623463c6

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # packaging/build.ps1 uses `py -m venv` when .venv is missing; runners often lack `py`.
      - name: Pre-create venv
        shell: pwsh
        run: |
          if (-not (Test-Path ".venv\Scripts\python.exe")) {
            python -m venv .venv
          }

      - name: Prepare FFmpeg for packaging (Refiner)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $zip = Join-Path $env:RUNNER_TEMP 'ffmpeg-8.1-essentials_build.zip'
          Invoke-WebRequest -Uri $env:FFMPEG_ESSENTIALS_URL -OutFile $zip
          $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath $zip).Hash.ToLowerInvariant()
          $want = ($env:FFMPEG_ESSENTIALS_SHA256).ToLowerInvariant()
          if ($actual -ne $want) {
            throw "FFmpeg zip SHA256 mismatch (expected $want, got $actual)"
          }
          Expand-Archive -LiteralPath $zip -DestinationPath $env:RUNNER_TEMP -Force
          $bin = Join-Path $env:RUNNER_TEMP 'ffmpeg-8.1-essentials_build\bin'
          if (-not (Test-Path (Join-Path $bin 'ffmpeg.exe'))) { throw "ffmpeg.exe missing under $bin" }
          if (-not (Test-Path (Join-Path $bin 'ffprobe.exe'))) { throw "ffprobe.exe missing under $bin" }
          "FETCHER_FFMPEG_BIN_DIR=$bin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build FetcherSetup.exe
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "${{ github.workspace }}\installer\build.ps1" -Clean -InstallInnoSetupIfMissing

      - name: Smoke test packaged Fetcher.exe
        shell: pwsh
        env:
          FETCHER_CI_SMOKE: "1"
          FETCHER_DEV_DB_PATH: ${{ runner.temp }}/fetcher-ci-smoke.sqlite3
          FETCHER_JWT_SECRET: ci-smoke-jwt-secret-only
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $appDir = Join-Path "${{ github.workspace }}" "dist\Fetcher"
          $exe = Join-Path $appDir "Fetcher.exe"
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing packaged exe: $exe" }
          & $exe --help
          $port = 28765
          # Inherit FETCHER_CI_SMOKE + FETCHER_DEV_DB_PATH; cwd must be app dir so one-folder bundle resolves deps.
          $proc = Start-Process -FilePath $exe -WorkingDirectory $appDir `
            -ArgumentList @("--host","127.0.0.1","--port",$port) -PassThru -WindowStyle Hidden
          try {
            $deadline = (Get-Date).AddMinutes(6)
            $ok = $false
            $lastErr = $null
            while ((Get-Date) -lt $deadline) {
              try {
                $r = Invoke-RestMethod -Uri "http://127.0.0.1:$port/healthz" -TimeoutSec 5
                if ($r.status -eq "ok" -and $r.version) {
                  if ($r.version.Length -lt 1) { throw "empty version in healthz" }
                  $ok = $true
                  break
                }
              } catch {
                $lastErr = $_
                Start-Sleep -Milliseconds 400
              }
            }
            if (-not $ok) {
              if ($proc.HasExited) { throw "Fetcher.exe exited early (exit $($proc.ExitCode)). Last error: $lastErr" }
              throw "Packaged app did not respond OK at /healthz on port $port within 6m. Last error: $lastErr"
            }
          } finally {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            Get-Process -Name "Fetcher" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $env:FETCHER_DEV_DB_PATH -Force -ErrorAction SilentlyContinue
          }

      - name: Verify PyInstaller bundle (Refiner templates + FFmpeg)
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          $root = Join-Path "${{ github.workspace }}" 'dist\Fetcher\_internal'
          @(
            'app\templates\refiner.html',
            'app\templates\refiner_settings.html',
            'bin\ffmpeg\ffmpeg.exe',
            'bin\ffmpeg\ffprobe.exe'
          ) | ForEach-Object {
            $p = Join-Path $root $_
            if (-not (Test-Path -LiteralPath $p)) {
              throw "Missing required bundle path: $p"
            }
          }

      - name: Create portable Windows bundle zip
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path 'dist\artifacts' | Out-Null
          $v = (Get-Content -LiteralPath 'VERSION' -Raw).Trim()
          $zip = Join-Path 'dist\artifacts' "Fetcher-Windows-${v}-bundle.zip"
          if (Test-Path -LiteralPath $zip) { Remove-Item -LiteralPath $zip -Force }
          $bundleRoot = Join-Path "${{ github.workspace }}" 'dist\Fetcher'
          Compress-Archive -Path (Join-Path $bundleRoot '*') -DestinationPath $zip

      # Repo Settings → Variables: ENABLE_CODE_SIGNING = true
      # Repo Settings → Secrets: WINDOWS_PFX_BASE64 (PFX as base64), WINDOWS_PFX_PASSWORD
      - name: Sign installer (optional)
        if: ${{ vars.ENABLE_CODE_SIGNING == 'true' }}
        shell: pwsh
        env:
          WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          & "${{ github.workspace }}\scripts\sign-installer.ps1" -InstallerPath "${{ github.workspace }}\installer\output\FetcherSetup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: FetcherSetup
          path: installer/output/FetcherSetup.exe
          if-no-files-found: error

      - name: Upload portable bundle (zip)
        uses: actions/upload-artifact@v7
        with:
          name: FetcherWindowsBundle
          path: dist/artifacts/*.zip
          if-no-files-found: error

  # Creates the GitHub Release + attaches installer + portable zip (no deployment Environment gate — those often
  # stall on “Review deployments” and leave tags without a Latest release).
  release:
    # Tag push (PAT or rare cases) OR manual "Run workflow" with ref = tag (recover missed releases).
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v8
        with:
          name: FetcherSetup
          path: release-asset/installer

      - name: Download portable bundle
        uses: actions/download-artifact@v8
        with:
          name: FetcherWindowsBundle
          path: release-asset/bundle

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-files
          cp "release-asset/installer/FetcherSetup.exe" release-files/
          cp release-asset/bundle/*.zip release-files/
          ls -la release-files/

      # Prepended above GitHub-generated notes (softprops: body + generate_release_notes).
      - name: Standard install section (Windows + Docker)
        id: install
        shell: bash
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          MINOR="${V%.*}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER}/${REPO_LOWER}"
          PKG_URL="https://github.com/${GITHUB_REPOSITORY}/pkgs/container/${REPO_LOWER}"
          {
            echo 'body<<EOF'
            echo "## Install"
            echo ""
            echo "### Windows"
            echo "Download **FetcherSetup.exe** or the portable **Fetcher-Windows-$V-bundle.zip** (attached below)."
            echo ""
            echo "### Docker (Linux)"
            echo "Pull the image for this release (**${GITHUB_REF_NAME}**):"
            echo ""
            echo '```bash'
            echo "docker pull ${IMG}:${V}"
            echo '```'
            echo ""
            echo "Other tags: \`${IMG}:latest\`, \`${IMG}:${MINOR}\` (minor series)."
            echo ""
            echo "**Container registry:** [${IMG}](${PKG_URL})"
            echo ""
            echo "---"
            echo ""
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          body: ${{ steps.install.outputs.body }}
          files: |
            release-files/FetcherSetup.exe
            release-files/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
