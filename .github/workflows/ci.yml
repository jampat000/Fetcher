# Canonical CI — single workflow for tests, dependency audit, and Docker image build verification.
# Release/tag/installer/GHCR are separate workflows (see tag-release.yml, build-installer.yml, docker-publish.yml).
name: Test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FETCHER_JWT_SECRET: ci-test-jwt-secret-only

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright (Chromium) for e2e
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: pytest -q

  pip-audit:
    if: github.ref == 'refs/heads/master' || (github.event_name == 'pull_request' && github.base_ref == 'master') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.7"

      - name: Audit requirements.txt
        run: pip-audit -r requirements.txt

  docker-build:
    if: github.ref == 'refs/heads/master' || (github.event_name == 'pull_request' && github.base_ref == 'master') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker build
        run: docker build -t fetcher:ci .
