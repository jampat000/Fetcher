# Auto-tags v{X.Y.Z} from VERSION when VERSION changes on master or main.
# Manual: Actions → this workflow → Run workflow, or .\scripts\ship-release.ps1 (pushes current branch + dispatch).
#
# IMPORTANT: `git push` of the tag uses `GITHUB_TOKEN`, which does NOT fire other `on: push: tags`
# workflows (GitHub security). So we explicitly dispatch "Build installer" and "Docker publish" for that tag ref.
# Manual run: Actions → "Tag release (from VERSION)" → Run workflow (retry / if auto was skipped).
name: Tag release (from VERSION)

on:
  push:
    branches:
      - master
      - main
    paths:
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: write
  actions: write # required to workflow_dispatch downstream workflows after pushing the tag

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag from VERSION
        id: ver
        run: |
          set -e
          V="$(tr -d ' \r\n' < VERSION)"
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be semver X.Y.Z, got: $V"
            exit 1
          fi
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if missing
        id: tag_push
        run: |
          set -e
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          TAG="${{ steps.ver.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag $TAG already exists on origin — skipping push (idempotent)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "Pushed $TAG — dispatching Build installer and Docker publish…"

      # Build installer must run at the tag commit (Windows bundle matches release).
      # Docker publish must be dispatched with ref = default branch so workflow YAML is current;
      # pass checkout_ref = tag so the image is built from the release commit (ref trap).
      - name: Dispatch Build installer and Docker publish
        if: steps.tag_push.outputs.pushed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.ver.outputs.tag }}';
            const defaultBranch = context.payload.repository.default_branch;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-installer.yml',
              ref: tag,
            });
            core.info(`Dispatched build-installer.yml for ref ${tag}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-publish.yml',
              ref: defaultBranch,
              inputs: { checkout_ref: tag },
            });
            core.info(`Dispatched docker-publish.yml on ${defaultBranch} with checkout_ref=${tag}`);
