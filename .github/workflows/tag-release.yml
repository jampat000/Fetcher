# Auto-tags v{X.Y.Z} from VERSION on the merge commit when VERSION changes on the default branch.
# That tag push triggers "Build installer". No local git required.
# Manual run: Actions → "Tag release (from VERSION)" → Run workflow (retry / if auto was skipped).
name: Tag release (from VERSION)

on:
  push:
    branches:
      - master
      - main
    paths:
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create and push tag if missing
        run: |
          set -e
          V="$(tr -d ' \r\n' < VERSION)"
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be semver X.Y.Z, got: $V"
            exit 1
          fi
          TAG="v${V}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag $TAG already exists on origin — skipping (idempotent)."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "Pushed $TAG — Build installer workflow should start next."
