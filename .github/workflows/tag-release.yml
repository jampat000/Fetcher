# Canonical release orchestrator (part 1 of 3): VERSION → git tag vX.Y.Z → dispatch Windows + Docker builds.
# Parts 2–3: build-installer.yml (FetcherSetup.exe + GitHub Release), docker-publish.yml (GHCR).
# CI (tests/audit/docker verify) is ci.yml only — not duplicated here.
#
# Auto-tags when VERSION changes on `master`. Manual: Actions → Run workflow, or .\scripts\ship-release.ps1.
# `GITHUB_TOKEN` tag push does NOT trigger other `on.push.tags` workflows — we must dispatch build-installer + docker-publish.
name: Tag release (from VERSION)

on:
  push:
    branches:
      - master
    paths:
      - "VERSION"
  workflow_dispatch:

permissions:
  contents: write
  actions: write # required to workflow_dispatch downstream workflows after pushing the tag

concurrency:
  group: tag-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag from VERSION
        id: ver
        run: |
          set -e
          V="$(tr -d ' \r\n' < VERSION)"
          if ! echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be semver X.Y.Z, got: $V"
            exit 1
          fi
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      # Single tag per VERSION: create if missing. If tag exists at HEAD, dispatch builds.
      # If tag peels to a different commit but that commit is an ancestor of HEAD (typical after
      # merging release/v… into master via merge commit), accept — do not fail or re-dispatch.
      # Otherwise fail (prevents silent drift vs VERSION).
      - name: Create and push tag if missing
        id: tag_push
        run: |
          set -euo pipefail
          echo "pushed=false" >> "$GITHUB_OUTPUT"
          echo "dispatch=false" >> "$GITHUB_OUTPUT"
          TAG="${{ steps.ver.outputs.tag }}"
          HEAD_SHA="$(git rev-parse HEAD)"
          # Peels annotated tag to commit; empty if tag absent
          REMOTE_PEEL="$(git ls-remote -q origin "refs/tags/${TAG}^{}" | cut -f1 || true)"
          if [ -z "$REMOTE_PEEL" ]; then
            REMOTE_SHA="$(git ls-remote -q origin "refs/tags/${TAG}" | head -n1 | cut -f1 || true)"
          else
            REMOTE_SHA="$REMOTE_PEEL"
          fi
          if [ -n "$REMOTE_SHA" ]; then
            if [ "$REMOTE_SHA" = "$HEAD_SHA" ]; then
              echo "Tag $TAG already exists at this commit — dispatching Build installer and Docker publish (no re-push)."
              echo "dispatch=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if git merge-base --is-ancestor "$REMOTE_SHA" "$HEAD_SHA" 2>/dev/null; then
              echo "Tag $TAG points at $REMOTE_SHA, an ancestor of HEAD $HEAD_SHA (merge commit) — release already tagged; skipping push and duplicate dispatch."
              exit 0
            fi
            echo "::error::Tag $TAG already exists on origin (commit $REMOTE_SHA) but VERSION bump commit is $HEAD_SHA and the tag is not an ancestor of HEAD. Bump VERSION to a new release or fix the remote tag."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "dispatch=true" >> "$GITHUB_OUTPUT"
          echo "Pushed $TAG"

      # Build installer must run at the tag commit (Windows bundle matches release).
      # Docker publish must be dispatched with ref = default branch so workflow YAML is current;
      # pass checkout_ref = tag so the image is built from the release commit (ref trap).
      - name: Dispatch Build installer and Docker publish
        if: steps.tag_push.outputs.dispatch == 'true'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.ver.outputs.tag }}';
            const defaultBranch = context.payload.repository.default_branch;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-installer.yml',
              ref: tag,
            });
            core.info(`Dispatched build-installer.yml for ref ${tag}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-publish.yml',
              ref: defaultBranch,
              inputs: { checkout_ref: tag },
            });
            core.info(`Dispatched docker-publish.yml on ${defaultBranch} with checkout_ref=${tag}`);
