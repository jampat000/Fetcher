# Verify the Docker image builds on changes to container inputs.
name: Docker build

on:
  push:
    branches: [master, main]
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - requirements.txt
      - VERSION
      - app/**
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - docker-compose.yml
      - requirements.txt
      - VERSION
      - app/**

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Docker build
        run: docker build -t fetcher:ci .
