# Canonical release — Docker (part 3 of 3): build + push image to GHCR. Windows: build-installer.yml.
# Orchestrator: tag-release.yml dispatches this after VERSION/tag (checkout_ref=vX.Y.Z — see docs/GITHUB-CLI.md).
# Pushes with GITHUB_TOKEN do not trigger downstream workflows; tag-release always dispatches explicitly.
# CI docker verify: ci.yml job `docker-build`.
name: Docker publish

on:
  workflow_dispatch:
    inputs:
      checkout_ref:
        description: 'Git ref to build (e.g. v2.0.15). Leave empty to build the workflow ref.'
        required: false
        type: string
        default: ''

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.checkout_ref != '' && github.event.inputs.checkout_ref || github.ref }}

      - name: Image name (lowercase for GHCR)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # After checkout, classify "release" vs branch experiment using ref + optional input.
      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          IMG="${{ steps.img.outputs.name }}"
          V=$(tr -d ' \r\n' < VERSION)
          MINOR="${V%.*}"
          WF_REF="${{ github.ref }}"
          CR="${{ github.event.inputs.checkout_ref }}"
          EV="${{ github.event_name }}"
          isrel=0
          if [[ "$WF_REF" == refs/tags/v* ]]; then isrel=1; fi
          if [[ "$EV" == "workflow_dispatch" && -n "$CR" && "$CR" == v* ]]; then isrel=1; fi
          if [[ "$isrel" -eq 1 ]]; then
            echo "tags=${IMG}:${V},${IMG}:${MINOR},${IMG}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMG}:${V},${IMG}:sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Verify image (ffmpeg + ffprobe in PATH)
        shell: bash
        run: |
          set -euo pipefail
          FIRST="$(echo '${{ steps.tags.outputs.tags }}' | cut -d',' -f1)"
          docker pull "$FIRST"
          docker run --rm "$FIRST" sh -c 'command -v ffmpeg >/dev/null && command -v ffprobe >/dev/null && ffmpeg -version | head -n1 && ffprobe -version | head -n1'
