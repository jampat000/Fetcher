# Publish the Linux container image to GitHub Container Registry (GHCR).
# Separate from the Windows installer workflow (.github/workflows/build-installer.yml).
# Tag pushes from GITHUB_TOKEN do not trigger this workflow; "Tag release" dispatches it for the tag ref.
name: Docker publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Image name (lowercase for GHCR)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag ref (push v* or workflow_dispatch with ref = tag): semver + latest.
      - name: Docker meta (tag ref)
        id: meta
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      # workflow_dispatch on a branch only: VERSION + sha (no :latest).
      - name: Image tags (branch manual)
        id: manualtags
        if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/heads/')
        run: |
          IMG="${{ steps.img.outputs.name }}"
          V=$(tr -d ' \r\n' < VERSION)
          echo "tags=${IMG}:${V},${IMG}:sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ startsWith(github.ref, 'refs/tags/v') && steps.meta.outputs.tags || steps.manualtags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels || '' }}
