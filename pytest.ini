[pytest]
# Repo root must be on sys.path for `from app...` imports (CI + local).
pythonpath = .
testpaths = tests
markers =
    no_auth_override: use real require_auth (tests upgrade / no-password flows)
    real_csrf: use real require_csrf (CSRF tests only; other tests override it)
    regen_screenshots: README screenshot regeneration (excluded from default collection; see tests/conftest.py and tests/e2e/test_readme_screenshots.py)
